<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Go Chat</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">
    <h1>Чат</h1>

    <div class="form" id="form">
        <input id="nick" placeholder="Имя">
        <input id="token" placeholder="Токен комнаты">

        <button onclick="createRoom()">Создать комнату</button>
        <button onclick="joinRoom()">Подключиться</button>
    </div>

    <div class="chat" id="chat">
        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input id="message" placeholder="Сообщение...">
            <button class="send" onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
